services:
  db:
    image: postgres:16-alpine
    container_name: temus-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: temus
      POSTGRES_USER: temus
      POSTGRES_PASSWORD: temus
    ports:
      - "5432:5432"
    volumes:
      - temus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temus -d temus"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  temus_pgdata:
